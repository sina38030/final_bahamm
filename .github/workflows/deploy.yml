name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}        # <- مهم
          username: ${{ secrets.SERVER_USER }}    # <- مهم
          key: ${{ secrets.SSH_PRIVATE_KEY }}     # <- مهم
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /srv/bahamm/frontend/current || exit 1
            git fetch --all
            git reset --hard origin/main
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
            npm run build
            pm2 reload all || sudo systemctl restart bahamm-frontend || true
